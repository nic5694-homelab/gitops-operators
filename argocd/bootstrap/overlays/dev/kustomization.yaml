apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - cluster-secret.yaml

namespace: argocd

patches:
  - target:
      kind: Application
      name: bootstrap
    patch: |-
      - op: replace
        path: /spec/source/targetRevision
        value: feat/integrate_kuma_waf

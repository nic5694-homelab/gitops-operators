apiVersion: v1
kind: Service
metadata:
  name: ids
  namespace: ids-system
  annotations:
    metallb.universe.tf/address-pool: default-pool
    metallb.universe.tf/loadBalancerIPs: 10.0.0.12
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.0.12
  selector:
    app: ids
  ports:
    - name: http
      port: 3000
      targetPort: 3000

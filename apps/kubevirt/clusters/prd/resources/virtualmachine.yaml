apiVersion: kubevirt.io/v1
kind: VirtualMachineInstance
metadata:
  name: testvmi-nocloud
  annotations:
    argocd.argoproj.io/sync-wave: "7" # ensure network attachment definition is applied before creating VMI
spec:
  terminationGracePeriodSeconds: 30
  domain:
    resources:
      requests:
        memory: 1024M
    devices:
      interfaces:
      - name: default
        masquerade: {}
      - name: physical-nic
        bridge:
          name: physical-network
      disks:
      - name: containerdisk
        disk:
          bus: virtio
      - name: emptydisk
        disk:
          bus: virtio
      - disk:
          bus: virtio
        name: cloudinitdisk
  networks:
  - name: default
    pod: {}
  - name: physical-nic
    multus:
      networkName: kubevirt/physical-network
  volumes:
  - name: containerdisk
    containerDisk:
      image: kubevirt/fedora-cloud-container-disk-demo:latest
  - name: emptydisk
    emptyDisk:
      capacity: "2Gi"
  - name: cloudinitdisk
    cloudInitNoCloud:
      userData: |-
        #cloud-config
        password: fedora
        chpasswd: { expire: False }
        network-config:
          version: 2
          ethernets:
            eth1:
              dhcp4: false
              addresses:
                - 192.168.0.210/24
              gateway4: 192.168.0.1
              nameservers:
                addresses:
                  - 192.168.0.242

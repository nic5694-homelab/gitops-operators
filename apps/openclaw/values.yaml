openclaw:
  configMode: "merge"           
  gatewayPort: 18789

  env:
    - name: LLM_API_BASE
      value: "http://cluster.local"
    - name: LLM_MODEL_NAME
      value: "meta-llama/Llama-2-7b-hf"
    - name: BROWSER_ARGS
      value: "--no-sandbox --disable-gpu-sandbox --disable-dev-shm-usage --disable-cpu-throttling"

ingress:
  main:
    enabled: true
    ingressClassName: "nginx" 
    
    annotations:
      kubernetes.io/ingress.class: "nginx"
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600" 

    hosts:
      - host: "openclaw.homelab"  
        paths:
          - path: /
            pathType: Prefix
            service:
              port: 18789                   

resources:
  limits:
    cpu: "2"
    memory: "4Gi"
    nvidia.com/gpu: 1
  requests:
    cpu: "1"
    memory: "2Gi"
    nvidia.com/gpu: 1

extraVolumes:
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 2Gi

extraVolumeMounts:
  - name: dshm
    mountPath: /dev/shm

persistence:
  enabled: true
  storageClass: "local-provisioner"      
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /data

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
    add:
      - SYS_RESOURCE
      - SYS_PTRACE

podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

nodeSelector:
  nvidia.com/gpu: "true"

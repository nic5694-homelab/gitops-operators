apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: physical-network
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"
  namespace: homelab-vms
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "physical-network",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge"
    }
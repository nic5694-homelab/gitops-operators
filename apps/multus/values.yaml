nameOverride: multus

image:
  repository: k8snetworkplumbingwg/multus-cni
  tag: latest-thick
  pullPolicy: IfNotPresent

rbac:
  create: true

serviceAccount:
  create: true
  automountServiceAccountToken: true

hostCNIBinDir: /var/lib/rancher/k3s/data/cni
hostCNINetDir: /var/lib/rancher/k3s/agent/etc/cni/net.d
